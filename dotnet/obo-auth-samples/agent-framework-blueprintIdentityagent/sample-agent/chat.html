<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBO Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
  #token-bar { display: flex; gap: 8px; padding: 12px 16px; background: #181825; border-bottom: 1px solid #313244; }
  #token-bar input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #45475a; background: #1e1e2e; color: #cdd6f4; font-size: 13px; }
  #token-bar button { padding: 8px 16px; border-radius: 6px; border: none; background: #89b4fa; color: #1e1e2e; font-weight: 600; cursor: pointer; white-space: nowrap; }
  #token-bar button:hover { background: #74c7ec; }
  #token-bar .status { font-size: 12px; align-self: center; min-width: 60px; }
  .ok { color: #a6e3a1; }
  .err { color: #f38ba8; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #89b4fa; color: #1e1e2e; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: #313244; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: transparent; color: #6c7086; font-size: 12px; }
  .msg.bot .meta { font-size: 11px; color: #6c7086; margin-top: 6px; }
  #input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #181825; border-top: 1px solid #313244; }
  #input-bar textarea { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #45475a; background: #1e1e2e; color: #cdd6f4; font-size: 14px; font-family: inherit; resize: none; height: 44px; }
  #input-bar textarea:focus { outline: none; border-color: #89b4fa; }
  #input-bar button { padding: 10px 20px; border-radius: 8px; border: none; background: #89b4fa; color: #1e1e2e; font-weight: 600; font-size: 14px; cursor: pointer; }
  #input-bar button:disabled { opacity: .4; cursor: not-allowed; }
  #input-bar button:hover:not(:disabled) { background: #74c7ec; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; align-self: flex-start; }
  .typing span { width: 8px; height: 8px; background: #6c7086; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>
</head>
<body>

<div id="token-bar">
  <input id="token" type="password" placeholder="Paste your Bearer token here (from az account get-access-token ...)" />
  <button onclick="verifyToken()">Verify</button>
  <span class="status" id="token-status"></span>
</div>

<div id="chat">
  <div class="msg system">Paste your token above, then start chatting. Get a token with:<br><code>az account get-access-token --scope "api://<your-blueprint-app-id>/access_agent" --query accessToken -o tsv</code></div>
</div>

<div id="input-bar">
  <textarea id="message" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
  <button id="send-btn" onclick="send()" disabled>Send</button>
</div>

<script>
const API = "https://<your-webapp-name>.azurewebsites.net";
const chatEl = document.getElementById("chat");
const msgEl = document.getElementById("message");
const sendBtn = document.getElementById("send-btn");
const tokenEl = document.getElementById("token");
const statusEl = document.getElementById("token-status");
let token = "";

tokenEl.addEventListener("input", () => {
  token = tokenEl.value.trim();
  sendBtn.disabled = !token;
  statusEl.textContent = "";
});

async function verifyToken() {
  if (!token) return;
  statusEl.textContent = "...";
  statusEl.className = "status";
  try {
    const r = await fetch(API + "/api/health");
    const d = await r.json();
    if (d.status === "healthy") { statusEl.textContent = "✓ connected"; statusEl.className = "status ok"; sendBtn.disabled = false; }
    else { statusEl.textContent = "✗ unhealthy"; statusEl.className = "status err"; }
  } catch (e) { statusEl.textContent = "✗ " + e.message; statusEl.className = "status err"; }
}

function addMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing";
  div.innerHTML = "<span></span><span></span><span></span>";
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() { document.getElementById("typing")?.remove(); }

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
}

async function send() {
  const text = msgEl.value.trim();
  if (!text || !token) return;
  msgEl.value = "";
  addMsg(text, "user");
  sendBtn.disabled = true;
  showTyping();
  try {
    const r = await fetch(API + "/api/obo-chat", {
      method: "POST",
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });
    hideTyping();
    if (!r.ok) {
      const err = await r.text();
      addMsg("Error " + r.status + ": " + err, "bot");
    } else {
      const d = await r.json();
      const div = addMsg(d.response || "(empty response)", "bot");
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `tools: ${d.toolCount} · tracing: ${d.tracingEnabled}`;
      div.appendChild(meta);
    }
  } catch (e) {
    hideTyping();
    addMsg("Network error: " + e.message, "bot");
  }
  sendBtn.disabled = false;
  msgEl.focus();
}
</script>
</body>
</html>
